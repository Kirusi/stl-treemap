name: CI build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  full-build:
    name: full build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --group dev
      - run: uv run black --check .
      - run: uv run ruff check
      - run: uv run pytest
      - run: uv run python -W ignore -m pdoc ./stl_treemap -o ./docs

  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyhon-version: [3.12, 3.13, 3.14]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run black --check .
      - run: uv run ruff check
      - run: uv run pytest
      - run: uv run python -W ignore -m pdoc ./stl_treemap -o ./docs