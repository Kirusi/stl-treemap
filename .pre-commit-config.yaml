repos:
  - repo: local
    hooks:
      - id: run-black
        name: Run Black Formatter
        entry: uv run black --check .
        language: system
        pass_filenames: false
      - id: run-ruff
        name: Run Ruff Linter
        entry: uv run ruff check
        language: system
        pass_filenames: false
      - id: tests
        name: Run Tests
        entry: uv run pytest
        language: system
        pass_filenames: false