name: CI build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  full-build:
    name: full build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

      - name: Generate docs with pdoc
        run: uv run python -W ignore -m pdoc ./stl_treemap -o ./docs

  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyhon-version: [3.12, 3.13, 3.14]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

      - name: Generate docs with pdoc
        run: uv run python -W ignore -m pdoc ./stl_treemap -o ./docs
